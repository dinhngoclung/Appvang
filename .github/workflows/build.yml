name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: ArtemSBulgakov/buildozer-action@v1
        with:
          command: android debug
      - uses: actions/upload-artifact@v3
        with:
          name: apk-file
          path: bin/*.apk
